<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Customizable Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app-shell">

      <div id="page-header">
        <div id="year-display-area">
          <button id="prev-year-btn" aria-label="Previous year">&#8249;</button>
          <span id="current-years-label"></span>
          <button id="next-year-btn" aria-label="Next year">&#8250;</button>
        </div>

        <!-- Selection info + period editor — hidden until a drag selection is made -->
        <div id="selection-panel" hidden>
          <div class="sp-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
          <div class="sp-body">
            <div class="sp-title">CURRENT SELECTION</div>
            <div class="sp-stats" id="selection-stats">Selected: 0 days</div>
          </div>
          <div class="sp-divider"></div>
          <div class="sp-editor">
            <input type="text" id="editor-name" placeholder="Add a label..." autocomplete="off" />
            <input type="color" id="editor-color" value="#e63946" />
            <button id="editor-confirm">Add Period</button>
          </div>
          <button id="editor-cancel">Clear</button>
        </div>

      </div>

      <div id="calendar-container"></div>

    </div>

    <script type="module" src="/src/script-bundle.ts"></script>
  </body>
</html>
